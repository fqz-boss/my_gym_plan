# Cloudflare Pages + D1 绑定
# 必填：下方 database_id 改为你在控制台创建的 D1 的 Database ID（UUID）
# 然后执行: npx wrangler d1 execute my-gym-plan-db --remote --file=./schema.sql 建表

name = "my-gym-plan"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "my-gym-plan-db"
database_id = "f7227e3d-c98e-4840-9b7c-c9d7f8f1695e"
